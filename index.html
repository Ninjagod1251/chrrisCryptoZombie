<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoZombies DApp</title>
  <link rel="icon" href="favicon.ico">
  <script language="javascript" type="text/javascript"
    src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script language="javascript" type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.2.7-rc.0/web3.min.js"></script>
  <script language="javascript" type="text/javascript" src="cryptozombies_abi.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-bottom: 2px solid #00ff88;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 2rem;
      color: #00ff88;
      text-shadow: 0 0 12px #00ff88;
      letter-spacing: 2px;
    }

    header p {
      color: #888;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    #account-bar {
      margin-left: auto;
      background: #0d2137;
      border: 1px solid #00ff8844;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.75rem;
      color: #00ff88;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px;
    }

    #txStatus {
      min-height: 36px;
      margin-bottom: 24px;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
      border-left: 4px solid #00ff88;
      background: #111;
      color: #00ff88;
      display: none;
    }

    #txStatus.active { display: block; }
    #txStatus.error  { border-color: #ff4444; color: #ff4444; }

    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 24px;
      border: 2px solid #00ff88;
      background: transparent;
      color: #00ff88;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      font-weight: bold;
      letter-spacing: 1px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    button:hover {
      background: #00ff88;
      color: #0a0a0f;
      box-shadow: 0 0 16px #00ff8877;
    }

    button.createzombieButton { border-color: #ff6b35; color: #ff6b35; }
    button.createzombieButton:hover { background: #ff6b35; color: #0a0a0f; box-shadow: 0 0 16px #ff6b3577; }

    button.levelupButton { border-color: #a855f7; color: #a855f7; }
    button.levelupButton:hover { background: #a855f7; color: #0a0a0f; box-shadow: 0 0 16px #a855f777; }

    #zombies {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .zombie-card {
      background: linear-gradient(145deg, #111827, #1a2744);
      border: 1px solid #00ff8833;
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .zombie-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px #00ff8822;
      border-color: #00ff8888;
    }

    .zombie-card::before {
      content: '🧟';
      font-size: 3rem;
      position: absolute;
      top: 12px;
      right: 16px;
      opacity: 0.15;
    }

    .zombie-card h3 {
      color: #00ff88;
      font-size: 1rem;
      margin-bottom: 14px;
      border-bottom: 1px solid #00ff8833;
      padding-bottom: 8px;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }

    .zombie-card .stat {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      margin-bottom: 6px;
    }

    .zombie-card .stat .label { color: #666; }
    .zombie-card .stat .value { color: #e0e0e0; }

    .zombie-card .dna-bar {
      margin-top: 12px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #00ff88, #a855f7, #ff6b35);
    }

    .zombie-card .level-badge {
      display: inline-block;
      background: #a855f722;
      border: 1px solid #a855f7;
      color: #a855f7;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.75rem;
      margin-bottom: 12px;
    }

    #empty-state {
      color: #444;
      text-align: center;
      padding: 60px 0;
      font-size: 1.1rem;
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>&#x1F9DF; CryptoZombies</h1>
      <p>Blockchain-powered zombie army on Ethereum</p>
    </div>
    <div id="account-bar">connecting...</div>
  </header>

  <div class="container">
    <div id="txStatus"></div>

    <div class="actions">
      <button class="showZombieButton">Show Zombies</button>
      <button class="createzombieButton">&#x2694; Create Zombie</button>
      <button class="levelupButton">&#x2B06; Level Up</button>
    </div>

    <div id="zombies"><div id="empty-state">Click "Show Zombies" to load your army</div></div>
  </div>

  <script>

    var cryptoZombies;
    var userAccount;
    const showZombieButton = document.querySelector('.showZombieButton');
    const createzombieButton = document.querySelector('.createzombieButton');
    const levelupButton = document.querySelector('.levelupButton');

    function startApp() {
	
      //ZombieOwnership contract address — update after `truffle migrate` or run `node scripts/update_frontend.js`
      var cryptoZombiesAddress = "0x5FbDB2315678afecb367f032d93F642f64180aa3";

      cryptoZombies = new web3.eth.Contract(cryptoZombiesABI, cryptoZombiesAddress);


 //the following code from Lesson 6, chapter 5 is obsolete
 //     var accountInterval = setInterval(function () {

  //      if (web3.eth.accounts[0] !== userAccount) {
          //userAccount = web3.eth.accounts[0];

     //     getZombiesByOwner(userAccount)
      //      .then(displayZombies);
      //  }
     // }, 100);

      cryptoZombies.events.Transfer({ filter: { _to: userAccount } })
        .on("data", function (event) {
          let data = event.returnValues;
          getZombiesByOwner(userAccount).then(displayZombies);
        }).on("error", console.error);
    }

    function displayZombies(ids) {
      $("#zombies").empty();
      if (ids.length === 0) {
        $("#zombies").html('<div id="empty-state">No zombies found for this account. Create one!</div>');
        return;
      }
      for (id of ids) {
        getZombieDetails(id)
          .then(function (zombie) {
            const dnaStr = zombie.dna.toString().padStart(16, '0');
            const readyDate = new Date(zombie.readyTime * 1000).toLocaleString();
            const shortName = zombie.name.length > 20
              ? zombie.name.slice(0, 10) + '...' + zombie.name.slice(-8)
              : zombie.name;
            $("#zombies").append(`
              <div class="zombie-card">
                <div class="level-badge">Level ${zombie.level}</div>
                <h3 title="${zombie.name}">${shortName}</h3>
                <div class="stat"><span class="label">DNA</span><span class="value">${dnaStr}</span></div>
                <div class="stat"><span class="label">Wins</span><span class="value">${zombie.winCount}</span></div>
                <div class="stat"><span class="label">Losses</span><span class="value">${zombie.lossCount}</span></div>
                <div class="stat"><span class="label">Ready</span><span class="value">${readyDate}</span></div>
                <div class="dna-bar" style="opacity: ${0.4 + (zombie.level * 0.1)}"></div>
              </div>`);
          });
      }
    }

    function setStatus(msg, isError = false) {
      let text = (msg && msg.message) ? msg.message : String(msg);
      // Friendlier messages for common errors
      if (text.includes("Internal JSON-RPC error") || text.includes("invalid block tag")) {
        text = "Contract not found on this network. Please run: ape run deploy --network ethereum:local:hardhat — then hard refresh (Ctrl+Shift+R).";
      } else if (text.includes("already been minted") || text.includes("execution reverted")) {
        text = "Transaction reverted — this account may already own a zombie. Switch MetaMask account to create another.";
      } else if (text.includes("User denied")) {
        text = "Transaction cancelled by user.";
      }
      $("#txStatus").text(text).removeClass("active error").addClass("active" + (isError ? " error" : ""));
    }

    function createRandomZombie(name) {
      setStatus("Creating new zombie on the blockchain. This may take a while...");
      return cryptoZombies.methods.createRandomZombie(name)
        .send({ from: userAccount })
        .on("receipt", function (receipt) {
          setStatus("Successfully created " + name + "!");
          getZombiesByOwner(userAccount).then(displayZombies);
        })
        .on("error", function (error) {
          setStatus(error, true);
        });
    }

    function feedOnKitty(zombieId, kittyId) {
      setStatus("Eating a kitty. This may take a while...");
      return cryptoZombies.methods.feedOnKitty(zombieId, kittyId)
        .send({ from: userAccount })
        .on("receipt", function (receipt) {
          setStatus("Ate a kitty and spawned a new Zombie!");
          getZombiesByOwner(userAccount).then(displayZombies);
        })
        .on("error", function (error) {
          setStatus(error, true);
        });
    }

    function levelUp(zombieId) {
      setStatus("Leveling up your zombie...");
      return cryptoZombies.methods.levelUp(zombieId)
        .send({ from: userAccount, value: web3.utils.toWei("0.001", "ether") })
        .on("receipt", function (receipt) {
          setStatus("Power overwhelming! Zombie successfully leveled up");
        })
        .on("error", function (error) {
          setStatus(error, true);
        });
    }

    function getZombieDetails(id) {
      return cryptoZombies.methods.zombies(id).call()
    }

    function zombieToOwner(id) {
      return cryptoZombies.methods.zombieToOwner(id).call()
    }

    function getZombiesByOwner(owner) {
      return cryptoZombies.methods.getZombiesByOwner(owner).call()
    }

    window.addEventListener('load', async () => {
    // Modern dapp browsers...
    if (window.ethereum) {
        window.web3 = new Web3(ethereum);
        try {
            // Request account access if needed
            const accounts = await ethereum.enable();
            // Acccounts now exposed
            userAccount = accounts[0];
            $("#account-bar").text(userAccount.slice(0,6) + "..." + userAccount.slice(-4));
            startApp()
        } catch (error) {
            // User denied account access...
        }
    }
    // Legacy dapp browsers...
    else if (window.web3) {
        window.web3 = new Web3(web3.currentProvider);
        // Acccounts always exposed
        userAccount = web3.eth.accounts[0];
        startApp()
    }
    // Non-dapp browsers...
    else {
        console.log('Non-Ethereum browser detected. You should consider trying MetaMask!');
    }
   });
 
   //the following code from Lesson 6, chapter 2 is obsolete
   //metamask no longer inject web3 since early 2021
   //window.addEventListener('load', function () {

  //    if (typeof web3 !== 'undefined') {
   //     web3js = new Web3(web3.currentProvider);
   //   } else {

    //  }


    //  startApp()

  //  }) 

   ethereum.on('accountsChanged', (accounts) => {
       window.location.reload();
   });

   ethereum.on('chainChanged', (chainId) => {
       window.location.reload(); 
   });  

 
    createzombieButton.addEventListener('click', () => {
      createRandomZombie(userAccount);

    });

    showZombieButton.addEventListener('click', () => {
      getZombiesByOwner(userAccount)
            .then(displayZombies);

    });

    levelupButton.addEventListener('click', () => {
      getZombiesByOwner(userAccount)
            .then(ids => {
              if (ids.length === 0) { setStatus("You have no zombies to level up!", true); return; }
              levelUp(ids[0]);
            });
    });



  </script>
</body>

</html>
